<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Plantle</title>
  <meta name="description" content="A daily plant-growing game. Water your plant, grow your garden, collect them all.">
  <meta name="theme-color" content="#f5f0e1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="favicon.svg">

  <!-- Open Graph (Discord, iMessage, etc.) -->
  <meta property="og:title" content="Plantle">
  <meta property="og:description" content="A daily plant-growing game. Water your plant, grow your garden, collect them all.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://daelyn-arch.github.io/plant-tamagotchi/">

  <!-- Twitter/X card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Plantle">
  <meta name="twitter:description" content="A daily plant-growing game. Water your plant, grow your garden, collect them all.">

  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Plant Screen -->
  <div id="plantScreen" class="screen plant-screen">
    <h1 class="app-title">Plantle</h1>

    <div class="plant-display">
      <div class="plant-canvas-wrap" id="plantCanvasWrap"></div>

      <div class="plant-info">
        <div class="plant-name" id="plantName">Loading...</div>
        <div class="plant-rarity" id="plantRarity"></div>
      </div>

      <div class="progress-bar-wrap">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
          <span class="progress-text" id="progressText">0%</span>
        </div>
        <div class="growth-info" id="growthInfo"></div>
      </div>

      <div class="streak-wrap">
        <span class="streak-label">Streak:</span>
        <span class="streak-count" id="streakCount">0 days</span>
        <button class="btn-icon" id="bonusesBtn" title="View bonuses"><span class="pixel-drop"></span></button>
      </div>

      <div class="popup-menu popup-bonuses" id="bonusesPopup" style="display:none">
        <div class="popup-menu-title">Growth Bonuses</div>
        <div id="bonusesList"></div>
      </div>
    </div>

    <div class="actions">
      <div id="actionsMain">
        <button class="btn btn-water" id="waterBtn">Water Your Plant</button>
        <div class="countdown-wrap" id="countdownWrap" style="display:none">
          <span class="countdown-label">Next watering in</span>
          <span class="countdown-time" id="countdownTime">--:--:--</span>
        </div>
        <div class="secondary-actions">
          <button class="btn" id="gardenBtn">View Garden</button>
          <button class="btn" id="inventoryBtn">Inventory</button>
          <button class="btn" id="gamesBtn">Games</button>
          <button class="btn" id="infoBtn">Info</button>
        </div>
      </div>
      <div id="gamesMenu" class="games-menu" style="display:none">
        <div class="games-menu-header">
          <span class="games-menu-title">Games</span>
          <button class="btn games-menu-back" id="gamesBackBtn">Back</button>
        </div>
        <div class="games-menu-grid" id="gamesMenuGrid"></div>
      </div>
    </div>
  </div>

  <!-- Garden Screen -->
  <div id="gardenScreen" class="screen garden-screen">
    <div id="gardenContainer"></div>
  </div>

  <!-- Inventory Screen -->
  <div id="inventoryScreen" class="screen inventory-screen">
    <div id="inventoryContainer"></div>
  </div>

  <!-- Item Gallery Screen -->
  <div id="itemGalleryScreen" class="screen item-gallery-screen">
    <div id="itemGalleryContainer"></div>
  </div>

  <!-- Info Screen -->
  <div id="infoScreen" class="screen info-screen">
    <div id="infoContainer"></div>
  </div>

  <!-- Species Gallery Screen -->
  <div id="galleryScreen" class="screen gallery-screen">
    <div id="galleryContainer"></div>
  </div>

  <!-- Tower Defense Screen -->
  <div id="towerDefenseScreen" class="screen td-screen">
    <div id="tdContainer" class="td-container">
      <canvas id="tdCanvas" width="640" height="640"></canvas>
      <div class="td-hud" id="tdHud">
        <span class="td-hud-wave">Wave 0</span>
        <span class="td-hud-hp">HP 100/100</span>
        <span class="td-hud-score">Score 0</span>
        <span class="td-hud-level">Lv.1 (0%)</span>
      </div>
      <div class="minigame-start-overlay" id="tdOverlay">
        <div id="tdOverlayContent"></div>
      </div>
    </div>
  </div>

  <!-- Citadel Screen -->
  <div id="citadelScreen" class="screen citadel-screen">
    <div id="citadelContainer" class="td-container">
      <canvas id="citadelCanvas" width="640" height="640"></canvas>
      <div class="citadel-hud" id="citadelHud"></div>
      <div class="minigame-start-overlay" id="citadelOverlay">
        <div id="citadelOverlayContent"></div>
      </div>
    </div>
  </div>

  <!-- Minigame Screen -->
  <div id="minigameScreen" class="screen minigame-screen">
    <div id="minigameContainer" class="minigame-container">
      <canvas id="minigameCanvas" width="320" height="160"></canvas>
      <div class="minigame-hud" id="minigameHud">
        <span id="minigameScore">0</span>
      </div>
      <div class="minigame-start-overlay" id="minigameOverlay">
        <div id="minigameOverlayContent"></div>
      </div>
    </div>
  </div>

  <!-- Completion Overlay -->
  <div id="completionOverlay" class="completion-overlay">
    <div class="completion-card">
      <h2 class="completion-title">Plant Complete!</h2>
      <div class="completion-canvas-wrap" id="completionCanvasWrap"></div>
      <div class="completion-name" id="completionName"></div>
      <div class="completion-rarity" id="completionRarity"></div>
      <div class="completion-stats" id="completionStats"></div>
      <button class="btn btn-water" id="moveToGardenBtn">Move to Garden</button>
    </div>
  </div>

  <!-- Trivia Overlay -->
  <div id="triviaOverlay" class="trivia-overlay">
    <div class="trivia-card">
      <h2 class="trivia-title rainbow-text">Plant Trivia of the Day</h2>
      <p class="trivia-question" id="triviaQuestion"></p>
      <div class="trivia-choices" id="triviaChoices"></div>
      <div class="trivia-result" id="triviaResult" style="display:none">
        <p class="trivia-fact" id="triviaFact"></p>
        <button class="btn btn-water trivia-continue-btn" id="triviaContinueBtn">Continue</button>
      </div>
    </div>
  </div>

  <!-- Dev Controls -->
  <div class="dev-controls">
    <div class="dev-panel" id="devPanel">
      <button class="dev-btn" id="devAdvance1">+1 Day</button>
      <button class="dev-btn" id="devAdvance7">+7 Days</button>
      <button class="dev-btn" id="devComplete">Complete</button>
      <button class="dev-btn" id="devNewPlant">New Plant</button>
      <button class="dev-btn" id="devAllItems">+All Items</button>
      <button class="dev-btn" id="devAllPlants">+All Plants</button>
      <button class="dev-btn" id="devReset">Reset All</button>
      <button class="dev-btn" id="devUnlimitedWater">∞ Water</button>
      <button class="dev-btn" id="devInspector">Inspect</button>
      <button class="dev-btn" id="devPotExp">+100 Pot EXP</button>
      <button class="dev-btn" id="devUnlockPR">Unlock PR</button>
      <button class="dev-btn" id="devUnlockTD">Unlock TD</button>
      <button class="dev-btn" id="devUnlockCitadel">Unlock Citadel</button>
    </div>
    <button class="dev-toggle" id="devToggle">DEV</button>
  </div>

  <script src="js/dev-inspector.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
